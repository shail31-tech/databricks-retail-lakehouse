name: Deploy to Databricks

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_dashboard:
        description: "Deploy jobs/files only, without updating the Lakeview dashboard"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  deploy:
    name: Test and deploy Databricks assets
    runs-on: ubuntu-latest
    environment: databricks

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_WORKSPACE_ROOT: ${{ vars.DATABRICKS_WORKSPACE_ROOT || '/Users/shailus2002@gmail.com/retail-lakehouse-files' }}
      DATABRICKS_WAREHOUSE_ID: ${{ vars.DATABRICKS_WAREHOUSE_ID || '542b132076a46f4c' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install CI dependencies
        run: python -m pip install -r requirements-ci.txt

      - name: Run tests
        run: python -m pytest

      - name: Compile source files
        run: python -m compileall src databricks scripts

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Check Databricks secrets are configured
        shell: bash
        run: |
          if [ -z "$DATABRICKS_HOST" ] || [ -z "$DATABRICKS_TOKEN" ]; then
            echo "DATABRICKS_HOST and DATABRICKS_TOKEN must be configured as GitHub repository secrets."
            exit 1
          fi

      - name: Validate Databricks authentication
        run: databricks current-user me

      - name: Deploy files, jobs, and dashboard
        if: ${{ inputs.skip_dashboard != true }}
        run: python scripts/deploy_to_databricks.py

      - name: Deploy files and jobs only
        if: ${{ inputs.skip_dashboard == true }}
        run: python scripts/deploy_to_databricks.py --skip-dashboard
